<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperfocal-Optimizer</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #1a1a1a; color: #eee; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 500px; margin: auto; }
        label { display: block; margin-top: 10px; font-size: 0.85em; color: #bbb; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px; border: 1px solid #444; border-radius: 6px; background: #333; color: #fff; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #007aff; outline: none; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer; }
        button:active { background: #218838; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; line-height: 1.8; display: none; }
        .error { background: #442222; border-left: 4px solid #ff3b30; color: #ffbaba; display: block !important; }
        .success { background: #223322; border-left: 4px solid #28a745; color: #eeffee; display: block !important; }
        .val { color: #00ffcc; font-family: monospace; font-size: 1.1em; font-weight: bold; }
        .highlight { color: #ffcc00; font-size: 1.3em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3 style="margin-top:0; color:#28a745;">遠景パンフォーカス解析</h3>
        
        <label>水平距離 (m)</label>
        <input type="number" id="dist_horiz" placeholder="例: 890">
        
        <label>被写体の標高 (m)</label>
        <input type="number" id="alt_obj" placeholder="例: 200">
        
        <label>撮影地の標高 (m)</label>
        <input type="number" id="alt_cam" placeholder="例: 10">
        
        <label>焦点距離 (mm)</label>
        <input type="number" id="focal" placeholder="例: 600">
        
        <label>センサーサイズ</label>
        <select id="sensor">
            <option value="0.03">フルサイズ (c=0.03)</option>
            <option value="0.02">APS-C (c=0.02)</option>
            <option value="0.015">マイクロフォーサーズ (c=0.015)</option>
        </select>
        
        <button onclick="calculate()">解析実行</button>
        
        <div id="result"></div>
    </div>

    <script>
        function calculate() {
            const resDiv = document.getElementById('result');
            resDiv.className = ''; 
            
            try {
                const d_raw = document.getElementById('dist_horiz').value;
                const h_obj_raw = document.getElementById('alt_obj').value;
                const h_cam_raw = document.getElementById('alt_cam').value;
                const f_raw = document.getElementById('focal').value;
                
                if (!d_raw || !h_obj_raw || !h_cam_raw || !f_raw) {
                    throw new Error("すべての項目を入力してください。");
                }

                const d = parseFloat(d_raw);
                const h_obj = parseFloat(h_obj_raw);
                const h_cam = parseFloat(h_cam_raw);
                const f = parseFloat(f_raw);
                const c = parseFloat(document.getElementById('sensor').value);

                if (isNaN(d) || isNaN(h_obj) || isNaN(h_cam) || isNaN(f)) {
                    throw new Error("有効な数値を入力してください。");
                }
                if (d <= 0 || f <= 0) {
                    throw new Error("距離と焦点距離は0より大きい必要があります。");
                }

                const h_diff = Math.abs(h_obj - h_cam);
                const L = Math.sqrt(Math.pow(d, 2) + Math.pow(h_diff, 2));
                const nMin = Math.pow(f, 2) / (2 * L * 1000 * c);

                // F0.95からF32までの実用F値リスト (1/3段刻み)
                const fSteps = [
                    0.95, 1.0, 1.1, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2, 2.5, 2.8, 3.2, 3.5, 
                    4.0, 4.5, 5.0, 5.6, 6.3, 7.1, 8.0, 9.0, 10, 11, 13, 14, 16, 18, 20, 22,
                    25, 29, 32
                ];
                
                let bestF = fSteps.find(step => step >= nMin);
                
                if (!bestF) {
                    throw new Error(`計算上のF値(F${nMin.toFixed(1)})がF32を超えています。条件が厳しすぎます。`);
                }

                const H = (Math.pow(f, 2) / (bestF * c)) + f;
                const Dn = H / 2;

                resDiv.classList.add('success');
                resDiv.innerHTML = `
                    ■ 直線距離: <span class="val">${L.toFixed(2)} m</span><br>
                    ■ 推奨設定: <span class="highlight">F${bestF}</span> 以上<br>
                    <hr style="border:0; border-top:1px solid #444;">
                    ■ 過焦点距離: <span class="val">${(H/1000).toFixed(2)} km</span><br>
                    ■ 合焦範囲 (近点): <span class="val">${(Dn/1000).toFixed(3)} km</span> ～ 無限遠<br>
                    <p style="font-size:0.85em; color:#bbb; margin-top:10px;">
                        ※ピントを <b>${(H/1000).toFixed(2)}km</b> 先に置くことで、被写体から無限遠まで解像します。
                    </p>
                `;

            } catch (e) {
                resDiv.classList.add('error');
                resDiv.innerHTML = `<b>エラー:</b> ${e.message}`;
            }
        }
    </script>
</body>
</html>
