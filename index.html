<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遠景パンフォーカス解析 Pro</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #1a1a1a; color: #eee; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 500px; margin: auto; }
        label { display: block; margin-top: 10px; font-size: 0.85em; color: #bbb; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px; border: 1px solid #444; border-radius: 6px; background: #333; color: #fff; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer; }
        button:active { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; line-height: 1.8; display: none; }
        .error { background: #442222; border-left: 4px solid #ff3b30; color: #ffbaba; display: block !important; }
        .success { background: #223322; border-left: 4px solid #28a745; color: #eeffee; display: block !important; }
        .val { color: #00ffcc; font-family: monospace; font-size: 1.1em; font-weight: bold; }
        .highlight { color: #ffcc00; font-size: 1.3em; font-weight: bold; }
        .angle-val { color: #ff9500; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3 style="margin-top:0; color:#007aff;">遠景パンフォーカス解析 Pro</h3>
        
        <label>水平距離 (m)</label>
        <input type="number" id="dist_horiz" placeholder="例: 2000">
        
        <label>被写体の標高 (m)</label>
        <input type="number" id="alt_obj" placeholder="例: 152">
        
        <label>撮影地の標高 (m)</label>
        <input type="number" id="alt_cam" placeholder="例: 50">
        
        <label>焦点距離 (mm)</label>
        <input type="number" id="focal" placeholder="例: 600">
        
        <label>センサーサイズ</label>
        <select id="sensor">
            <option value="0.03">フルサイズ (c=0.03)</option>
            <option value="0.02">APS-C (c=0.02)</option>
            <option value="0.015">マイクロフォーサーズ (c=0.015)</option>
        </select>
        
        <button id="btn_calc">解析実行</button>
        
        <div id="result"></div>
    </div>

    <script>
        $(document).ready(function() {
            $('#btn_calc').on('click', function() {
                const $res = $('#result');
                $res.removeClass('success error').hide();

                try {
                    const d = parseFloat($('#dist_horiz').val());
                    const h_obj = parseFloat($('#alt_obj').val());
                    const h_cam = parseFloat($('#alt_cam').val());
                    const f = parseFloat($('#focal').val());
                    const c = parseFloat($('#sensor').val());

                    if (isNaN(d) || isNaN(h_obj) || isNaN(h_cam) || isNaN(f)) {
                        throw new Error("すべての項目を正しく入力してください。");
                    }
                    if (d <= 0 || f <= 0) {
                        throw new Error("距離と焦点距離は0より大きい必要があります。");
                    }

                    // --- 物理計算 (単位: m) ---
                    const h_diff = h_obj - h_cam;
                    const L = Math.sqrt(Math.pow(d, 2) + Math.pow(h_diff, 2));
                    const angleDeg = Math.atan2(h_diff, d) * (180 / Math.PI);

                    // 過焦点距離 H (m) = f^2 / (N * c) + f
                    // ※単位合わせ: f(mm)をmにするには /1000、c(mm)をmにするには /1000
                    // 公式を変形して、最終的な m を出す: (f^2 / (N * c)) / 1000
                    const nMin = Math.pow(f, 2) / (2 * L * 1000 * c);
                    const fSteps = [0.95, 1.0, 1.1, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2, 2.5, 2.8, 3.2, 3.5, 4.0, 4.5, 5.0, 5.6, 6.3, 7.1, 8.0, 9.0, 10, 11, 13, 14, 16, 18, 20, 22, 25, 29, 32];
                    
                    let bestF = fSteps.find(step => step >= nMin);
                    if (!bestF) throw new Error("条件が厳しすぎます（F32超）。");

                    // 過焦点距離 H (m) の再計算
                    const H_m = (Math.pow(f, 2) / (bestF * c)) / 1000;
                    const Dn_m = H_m / 2;

                    // 結果の表示
                    $res.addClass('success').html(`
                        ■ 直線距離: <span class="val">${L.toFixed(2)} m</span><br>
                        ■ 被写体の仰角: <span class="angle-val">${angleDeg.toFixed(2)}°</span><br>
                        <hr style="border:0; border-top:1px solid #444;">
                        ■ 推奨設定: <span class="highlight">F${bestF}</span> 以上<br>
                        ■ 過焦点距離: <span class="val">${H_m.toFixed(2)} m</span><br>
                        ■ 合焦範囲 (近点): <span class="val">${Dn_m.toFixed(2)} m</span> ～ 無限遠
                    `).fadeIn();

                } catch (e) {
                    $res.addClass('error').html(`<b>エラー:</b> ${e.message}`).fadeIn();
                }
            });
        });
    </script>
</body>
</html>
